[defaults]
inventory                       = ./inventory
deprecation_warnings            = False
become_method                   = sudo
retry_files_enabled             = False
#display_skipped_hosts          = False
#stdout_callback                = debug
#stderr_callback                = debug
#allow_world_readable_tmpfiles  = true
#remote_tmp                     = /tmp/ansible
interpreter_python              = auto_legacy_silent
command_warnings                = False
transport                       = ssh


[ssh_connection]
# Enable pipelining to improve performance by reducing SSH operations.
# Note: Requires 'requiretty' to be disabled in the sudoers file on target hosts,
# or privilege escalation (become) may fail when using sudo.
# It is disabled by default on most modern systems.
pipelining                      = True
ssh_executable                  = ./gssh.sh
